    <script>
    (function(){
        var PASS_HASH = '355dc31fbc12be05611b2f3fedac4e4fff880d45de45b2928e18c89caa8fb57e';
        var SESSION_KEY = 'jwt_dashboard_auth';
        async function sha256(msg){
            var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
            return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
        }
        async function checkAuth(){
            if(sessionStorage.getItem(SESSION_KEY)==='1') return;
            var tries = 0;
            while(tries < 3){
                var pw = prompt('请输入访问密码：');
                if(pw === null){ document.body.innerHTML='<div style="text-align:center;padding:120px;font-size:18px;color:#888;">已取消访问</div>'; return; }
                var h = await sha256(pw);
                if(h === PASS_HASH){ sessionStorage.setItem(SESSION_KEY,'1'); return; }
                tries++;
                if(tries < 3) alert('密码错误，还有'+(3-tries)+'次机会');
            }
            document.body.innerHTML='<div style="text-align:center;padding:120px;font-size:18px;color:#888;">密码错误次数过多，请刷新页面重试</div>';
        }
        document.addEventListener('DOMContentLoaded', checkAuth);
    })();
    </script>
    <!-- ===== 密码保护 END ===== -->

        function loadData() {
            document.getElementById('updateTime').textContent = '数据加载中...';
            
            // 优先使用内嵌数据（每次生成看板数据时自动更新，无缓存问题）
            if (typeof EMBEDDED_DASHBOARD_DATA !== 'undefined') {
                duoweiData = EMBEDDED_DASHBOARD_DATA['多维'] || [];
                lesukeData = EMBEDDED_DASHBOARD_DATA['乐速克'] || [];
                console.log('内嵌数据加载成功: 多维', duoweiData.length, '条, 乐速克', lesukeData.length, '条');
                refreshUI();
                return;
            }
            
            let loaded = false;
            
            // 添加时间戳参数破坏缓存，确保每次刷新都读取最新数据
            const cacheBuster = '?_t=' + Date.now();
            const dataUrl = DATA_PATH + cacheBuster;
            
            // 方法1: 同步 XMLHttpRequest（兼容 file:// 协议）
            try {
                const xhr = new XMLHttpRequest();
                xhr.open('GET', dataUrl, false);
                xhr.send(null);
                if (xhr.status === 200 || xhr.status === 0) {
                    const dashboardData = JSON.parse(xhr.responseText);
                    duoweiData = dashboardData['多维'] || [];
                    lesukeData = dashboardData['乐速克'] || [];
                    loaded = true;
                    console.log('XHR加载成功: 多维', duoweiData.length, '条, 乐速克', lesukeData.length, '条');
                }
            } catch (e) {
                console.log('XHR加载失败:', e.message);
            }
            
            // 方法2: 如果XHR失败，尝试用fetch异步加载
            if (!loaded) {
                fetch(dataUrl)
                    .then(r => r.json())
                    .then(dashboardData => {
                        duoweiData = dashboardData['多维'] || [];
                        lesukeData = dashboardData['乐速克'] || [];
                        console.log('fetch加载成功: 多维', duoweiData.length, '条, 乐速克', lesukeData.length, '条');
                        refreshUI();
                    })
                    .catch(e => {
                        console.log('fetch也失败，使用内嵌示例数据:', e.message);
                        loadEmbeddedData();
                        refreshUI();
                    });
                return; // 异步，等回调
            }
            
            refreshUI();
        }

        }

        function initFilters() {
            populateFilter('dwDate', [...new Set(duoweiData.map(d => d['日期']))]);
            populateFilter('dwPlatform', [...new Set(duoweiData.map(d => d['平台']))]);
            populateFilter('dwShop', [...new Set(duoweiData.filter(d => d['店铺名称']).map(d => d['店铺名称']))]);
            populateFilter('dwSpec', [...new Set(duoweiData.map(d => d['品规']))]);
            
            populateFilter('lkDate', [...new Set(lesukeData.map(d => d['日期']))]);
            populateFilter('lkPlatform', [...new Set(lesukeData.map(d => d['平台']))]);
            populateFilter('lkShop', [...new Set(lesukeData.filter(d => d['店铺名称']).map(d => d['店铺名称']))]);
            populateFilter('lkSpec', [...new Set(lesukeData.map(d => d['品规']))]);
        }
        
        function populateFilter(id, options) {
            const select = document.getElementById(id);
            const firstOption = select.options[0];
            select.innerHTML = '';
            select.appendChild(firstOption);
            
            options.sort().forEach(opt => {
                if (opt) {
                    const option = document.createElement('option');
                    option.value = opt;
                    option.textContent = opt;
                    select.appendChild(option);
                }
            });
        }
        
        function getFilteredData(data, prefix) {
            const date = document.getElementById(prefix + 'Date').value;
            const platform = document.getElementById(prefix + 'Platform').value;
            const shop = document.getElementById(prefix + 'Shop').value;
            const spec = document.getElementById(prefix + 'Spec').value;
            
            return data.filter(d => {
                if (date && d['日期'] !== date) return false;
                if (platform && d['平台'] !== platform) return false;
                if (shop && d['店铺名称'] !== shop) return false;
                if (spec && d['品规'] !== spec) return false;
                return true;
            });
        }

            };
            
            const datasets = [];
            
            // 各平台现价折线
            platforms.forEach(platform => {
                const pData = [];
                dates.forEach(date => {
                    const items = data.filter(d => d['日期'] === date && d['平台'] === platform);
                    const avgPrice = items.length > 0 ? items.reduce((sum, d) => sum + d['现价'], 0) / items.length : null;
                    pData.push(avgPrice ? parseFloat(avgPrice.toFixed(2)) : null);
                });
                datasets.push({
                    label: platform + '-现价',
                    data: pData,
                    borderColor: platformColors[platform] || color,
                    backgroundColor: (platformColors[platform] || color) + '33',
                    tension: 0.4,
                    fill: false,
                    borderWidth: 2
                });
            });
            
            // 极限价折线（虚线红色）- 按日期+品规分组，每天显示
            const limitData = [];
            dates.forEach(date => {
                const items = data.filter(d => d['日期'] === date && (d['极限价'] || 0) > 0);
                const avgLimit = items.length > 0 ? items.reduce((sum, d) => sum + d['极限价'], 0) / items.length : null;
                limitData.push(avgLimit ? parseFloat(avgLimit.toFixed(2)) : null);
            });
            // 只有至少有一个有效极限价数据时才添加极限价折线
            const hasValidLimit = limitData.some(v => v !== null);
            if (hasValidLimit) {
                datasets.push({
                    label: '极限价',
                    data: limitData,
                    borderColor: '#d32f2f',
                    backgroundColor: 'transparent',
                    borderDash: [8, 4],
                    tension: 0.4,
                    fill: false,
                    borderWidth: 2,
                    pointStyle: 'rectRot',
                    pointRadius: 5,
                    pointHoverRadius: 7
                });
            }
            
            // 计算Y轴范围：包含所有现价和极限价
            let allValues = [];
            datasets.forEach(ds => {
                ds.data.forEach(v => { if (v !== null && v !== undefined) allValues.push(v); });
            });
            const yMin = allValues.length > 0 ? Math.min(...allValues) : 0;
            const yMax = allValues.length > 0 ? Math.max(...allValues) : 100;
            const yPadding = (yMax - yMin) * 0.15 || 10; // 15%留白
            const yAxisMin = Math.max(0, yMin - yPadding);
            const yAxisMax = yMax + yPadding;
            
            if (dwCharts[canvasId]) dwCharts[canvasId].destroy();
            if (lkCharts[canvasId]) lkCharts[canvasId].destroy();
            
            const chart = new Chart(ctx, {
                type: 'line',
                data: { labels: dates, datasets: datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { 
                            position: 'top', 
                            labels: { 
                                color: '#595959', 
                                usePointStyle: true,
                                padding: 16,
                                font: { size: 12, weight: 500 }
                            } 
                        } 
                    },
                    scales: {
                        x: { 
                            ticks: { color: '#8c8c8c', font: { size: 11 } }, 
                            grid: { display: false },
                            border: { display: false }
                        },
                        y: {
                            min: yAxisMin,
                            max: yAxisMax,
                            ticks: { color: '#8c8c8c', font: { size: 11 } },
                            grid: { color: '#f0f0f0', drawBorder: false },
                            border: { display: false }
                        }
                    }
                }
            });
            
            if (canvasId.startsWith('dw')) dwCharts[canvasId] = chart;
            else lkCharts[canvasId] = chart;
        }
        
        // 柱状图：按品规的现价vs极限价
        function renderSpecBarChart(canvasId, data, color) {
            const ctx = document.getElementById(canvasId);
            if (!ctx) return;
            
            const bySpec = {};
            data.forEach(d => {
                if (!bySpec[d['品规']]) {
                    bySpec[d['品规']] = { 现价: [], 极限价: [] };
                }
                bySpec[d['品规']].现价.push(d['现价']);
                bySpec[d['品规']].极限价.push(d['极限价'] || 0);
            });
            
            const labels = Object.keys(bySpec);
            const avg现价 = labels.map(l => {
                const arr = bySpec[l].现价;
                return arr.length > 0 ? (arr.reduce((a, b) => a + b, 0) / arr.length).toFixed(2) : 0;
            });
            const avg极限价 = labels.map(l => {
                const arr = bySpec[l].极限价.filter(v => v > 0); // 只取有效极限价
                return arr.length > 0 ? (arr.reduce((a, b) => a + b, 0) / arr.length).toFixed(2) : 0;
            });
            
            if (dwCharts[canvasId]) dwCharts[canvasId].destroy();
            if (lkCharts[canvasId]) lkCharts[canvasId].destroy();
            
            const chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        { label: '平均现价', data: avg现价, backgroundColor: color + 'cc', borderColor: color, borderWidth: 1, borderRadius: 4 },
                        { label: '平均极限价', data: avg极限价, backgroundColor: '#d32f2f99', borderColor: '#d32f2f', borderWidth: 1, borderRadius: 4 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { 
                            position: 'top', 
                            labels: { 
                                color: '#595959',
                                padding: 16,
                                font: { size: 12, weight: 500 }
                            } 
                        } 
                    },
                    scales: {
                        x: { 
                            ticks: { color: '#8c8c8c', font: { size: 11 } }, 
                            grid: { display: false },
                            border: { display: false }
                        },
                        y: { 
                            ticks: { color: '#8c8c8c', font: { size: 11 } }, 
                            grid: { color: '#f0f0f0', drawBorder: false },
                            border: { display: false }
                        }
                    }
                }
            });
            
            if (canvasId.startsWith('dw')) dwCharts[canvasId] = chart;
            else lkCharts[canvasId] = chart;
        }
        
        // 柱状图：价格合格率按日期+店铺走势（仅展示最近3日数据）
        function renderQualifyRateChart(canvasId, data, color) {
            const ctx = document.getElementById(canvasId);
            if (!ctx) return;
            
            // 只取最近3日数据
            const allDates = [...new Set(data.map(d => d['日期']))].sort();
            const recent3Dates = allDates.slice(-3);
            
            const dates = recent3Dates;
            
            // 按店铺分组（替代原来的按平台分组）
            const shops = [...new Set(data.filter(d => d['店铺名称']).map(d => d['店铺名称']))];
            
            // 店铺颜色映射 - 每个店铺不同颜色
            const shopColorMap = {};
            const shopColors = ['#3b82f6', '#22c55e', '#f59e0b', '#8b5cf6', '#ec4899', '#06b6d4', '#ef4444'];
            shops.forEach((shop, i) => {
                shopColorMap[shop] = shopColors[i % shopColors.length];
            });
            
            const datasets = shops.map(shop => {
                const rateData = [];
                dates.forEach(date => {
                    const items = data.filter(d => d['日期'] === date && d['店铺名称'] === shop);
                    const total = items.length;
                    const qualified = items.filter(d => d['价差'] > 0).length;
                    const rate = total > 0 ? (qualified / total * 100) : null;
                    rateData.push(rate !== null ? parseFloat(rate.toFixed(1)) : null);
                });
                return {
                    label: shop,
                    data: rateData,
                    backgroundColor: shopColorMap[shop] + 'cc',
                    borderColor: shopColorMap[shop],
                    borderWidth: 1,
                    borderRadius: 5,
                    barPercentage: 0.7,
                    categoryPercentage: 0.8
                };
            });
            
            if (dwCharts[canvasId]) dwCharts[canvasId].destroy();
            if (lkCharts[canvasId]) lkCharts[canvasId].destroy();
            
            const chart = new Chart(ctx, {
                type: 'bar',
                data: { labels: dates, datasets: datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { 
                            position: 'top', 
                            labels: { 
                                color: '#595959',
                                padding: 16,
                                font: { size: 11, weight: 500 },
                                usePointStyle: true
                            } 
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return context.dataset.label + ': ' + context.raw + '%';
                                }
                            }
                        }
                    },
                    scales: {
                        x: { 
                            ticks: { color: '#8c8c8c', font: { size: 11 } }, 
                            grid: { display: false },
                            border: { display: false },
                            stacked: false
                        },
                        y: { 
                            min: 0,
                            max: 105,
                            ticks: { 
                                color: '#8c8c8c', 
                                font: { size: 11 },
                                callback: function(value) {
                                    return value <= 100 ? value + '%' : '';
                                },
                                stepSize: 20
                            }, 
                            grid: { color: '#f0f0f0', drawBorder: false },
                            border: { display: false }
                        }
                    }
                }
            });
            
            if (canvasId.startsWith('dw')) dwCharts[canvasId] = chart;
            else lkCharts[canvasId] = chart;
        }
        
        function updateStats() {
            updateDuoweiStats();
            updateLesukeStats();
        }
        
        function updateDuoweiStats() {
            const filtered = getFilteredData(duoweiData, 'dw');
            document.getElementById('dwTotal').textContent = filtered.length;
            
            const alerts = filtered.filter(d => d['价差'] < 0);
            document.getElementById('dwAlertCount').textContent = alerts.length;
        }
        
        function updateLesukeStats() {
            const filtered = getFilteredData(lesukeData, 'lk');
            document.getElementById('lkTotal').textContent = filtered.length;
            
            const alerts = filtered.filter(d => d['价差'] < 0);
            document.getElementById('lkAlertCount').textContent = alerts.length;
        }
        
        function updateAlertTables() {
            updateDuoweiAlerts();
            updateLesukeAlerts();
        }
        
        function updateDuoweiAlerts() {
            const filtered = getFilteredData(duoweiData, 'dw');
            const alerts = filtered.filter(d => d['价差'] < 0);
            
            const table = document.getElementById('dwAlertTable');
            const noAlert = document.getElementById('dwNoAlert');
            const tbody = document.getElementById('dwAlertBody');
            
            if (alerts.length === 0) {
                table.style.display = 'none';
                noAlert.style.display = 'block';
            } else {
                table.style.display = 'table';
                noAlert.style.display = 'none';
                tbody.innerHTML = alerts.map(d => `
                    <tr>
                        <td>${d['日期']}</td>
                        <td>${d['平台']}</td>
                        <td>${d['店铺名称'] || '-'}</td>
                        <td>${d['品规']}</td>
                        <td>¥${d['现价']}</td>
                        <td>¥${d['极限价'] || 0}</td>
                        <td class="price-low">¥${d['价差']}</td>
                        <td style="font-size:12px">${d['促销信息'] || '-'}</td>
                    </tr>
                `).join('');
            }
        }
        
        function updateLesukeAlerts() {
            const filtered = getFilteredData(lesukeData, 'lk');
            const alerts = filtered.filter(d => d['价差'] < 0);
            
            const table = document.getElementById('lkAlertTable');
            const noAlert = document.getElementById('lkNoAlert');
            const tbody = document.getElementById('lkAlertBody');
            
            if (alerts.length === 0) {
                table.style.display = 'none';
                noAlert.style.display = 'block';
            } else {
                table.style.display = 'table';
                noAlert.style.display = 'none';
                tbody.innerHTML = alerts.map(d => `
                    <tr>
                        <td>${d['日期']}</td>
                        <td>${d['平台']}</td>
                        <td>${d['店铺名称'] || '-'}</td>
                        <td>${d['品规']}</td>
                        <td>¥${d['现价']}</td>
                        <td>¥${d['极限价'] || 0}</td>
                        <td class="price-low">¥${d['价差']}</td>
                        <td style="font-size:12px">${d['促销信息'] || '-'}</td>
                    </tr>
                `).join('');
            }
        }
        
        window.onload = loadData;
    </script>
